name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# 릴리스 생성(태그 푸시 시)에 필요한 쓰기 권한
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mingw-w64 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-mingw-w64 make python3

      - name: Build (x64 + x86)
        run: make

      - name: Verify size budget (초경량 회귀 검사)
        run: |
          ls -la dist/
          for f in dist/*.exe; do
            size=$(stat -c%s "$f")
            echo "$f: $size bytes"
            if [ "$size" -gt 8192 ]; then
              echo "::error::$f 가 8KB를 초과했습니다 ($size bytes) — 초경량 원칙 위반"
              exit 1
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nShiftSpace
          path: dist/*.exe

      - name: Package (exe별 zip 압축)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd dist
          for f in *.exe; do
            zip -9 "${f%.exe}.zip" "$f"
          done
          ls -la *.zip

      - name: Release (태그 푸시 시 zip 첨부)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true

  # 태그 배포 시 Chocolatey 커뮤니티 저장소에 자동 게시.
  # 저장소 시크릿 CHOCO_API_KEY 가 등록되어 있어야 실제 push 됨 (없으면 pack까지만).
  chocolatey:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    env:
      CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare package (버전·체크섬 주입)
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          $base = 'https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}'
          Invoke-WebRequest "$base/nShiftSpace-x86.zip" -OutFile x86.zip
          Invoke-WebRequest "$base/nShiftSpace-x64.zip" -OutFile x64.zip
          $sum32 = (Get-FileHash x86.zip -Algorithm SHA256).Hash.ToLower()
          $sum64 = (Get-FileHash x64.zip -Algorithm SHA256).Hash.ToLower()
          $dir = 'packaging/chocolatey'
          (Get-Content "$dir/nshiftspace.nuspec" -Raw) -replace '__VERSION__', $version |
            Set-Content "$dir/nshiftspace.nuspec"
          (Get-Content "$dir/tools/chocolateyinstall.ps1" -Raw) `
            -replace '__VERSION__', $version `
            -replace '__CHECKSUM32__', $sum32 `
            -replace '__CHECKSUM64__', $sum64 |
            Set-Content "$dir/tools/chocolateyinstall.ps1"

      - name: choco pack
        shell: pwsh
        run: choco pack packaging/chocolatey/nshiftspace.nuspec --outputdirectory .

      - name: choco push
        if: env.CHOCO_API_KEY != ''
        shell: pwsh
        run: choco push (Get-Item nshiftspace.*.nupkg).FullName --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY

      - name: Upload nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: chocolatey-package
          path: nshiftspace.*.nupkg
